name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Предотвращает параллельные запуски агента на одном и том же issue/PR.
# cancel-in-progress: false — новый запуск ждёт завершения текущего,
# а не обрывает агента в середине работы (например, в момент создания PR).
concurrency:
  group: opencode-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  opencode:
    if: |
      github.event.comment.user.type != 'Bot' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR') &&
      (contains(github.event.comment.body, ' /oc') ||
       startsWith(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, ' /opencode') ||
       startsWith(github.event.comment.body, '/opencode'))
    # user.type != 'Bot' — агент не реагирует на собственные и чужие бот-комментарии (защита от зацикливания).
    # author_association — агента могут вызвать только владелец, участник или внешний соавтор репозитория;
    # посторонние в публичном репозитории не расходуют платный API-бюджет.
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/kimi-k2.6
          prompt: |
            When fixing issues or making any code changes, use Conventional Commits for ALL commit messages.
            Format: <type>[optional scope]: <description>
            - fix: for bug fixes, feat: for features, refactor: for refactoring
            - Description: lowercase, imperative mood, no trailing period
            - Example: fix(auth): handle null token on login